version: "3.8"

services:

  spaceships-gateway:
    image: localhost/spaceships-gateway:latest
    container_name: spaceships-gateway
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - /home/cecconi/spaceships/relises:/relises

  spaceships-server:
    image: localhost/spaceships-server:latest
    container_name: spaceships-server
    restart: always
    ports:
      - "7777:7777"
      - "7778:7778"
    depends_on:
      - spaceships-gateway