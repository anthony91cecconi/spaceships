server:
  port: 8089

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:authdb}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

jwt:
  secret: ${JWT_SECRET:ThisIsAVeryLongSecretKeyForJWTSigningThatMustBeAtLeast256BitsLong!!}
  expiration-ms: 43200000

google:
  client-id: ${GOOGLE_CLIENT_ID:}

logging:
  level:
    com.authservice: DEBUG
    org.springframework.security: INFO
